model:
  type: ResidualVQAutoEncoder
  token_dim: 64
  encoder_depth: 8
  decoder_depth: 8
  num_heads: 8
  num_embeddings: 4096
  bottleneck : residual-vae
  quant:
    vq_beta: 1
    ema_decay: 0.95

dataset:
  dir: ./datasets/processed
  filter_fn: all



super_parameters:
  epochs: 5000
  batch_size: 512
  learning_rate: 0.0001
  weight_decay: 0.00001
  cuda: 0

save:
  save_folder: ./pretrained/vqvae/all